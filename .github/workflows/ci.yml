name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nft-engine/shared typecheck
      - run: pnpm --filter @nft-engine/server typecheck
      - run: pnpm --filter @nft-engine/web typecheck
      - run: pnpm --filter @nft-engine/server test
      - run: pnpm --filter @nft-engine/web build
